name: Mirror to AuraScale

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug token presence
        env:
          TOKEN: ${{ secrets.AURASCALE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "TOKEN is empty - secret not found"
          else
            echo "TOKEN is set (length: ${#TOKEN})"
          fi

      - name: Push to AuraScale repo
        env:
          TOKEN: ${{ secrets.AURASCALE_TOKEN }}
        run: |
          git config user.email "reegen@aurascale.co.uk"
          git config user.name "aurascale-team"
          git push https://aurascale-team:${TOKEN}@github.com/aurascale-team/thenonsenserealm.git main --force
