name: Sync from Chester

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull from Chester, rewrite author, restore sync.yml
        run: |
          git config user.email "reegen@aurascale.co.uk"
          git config user.name "aurascale-team"

          cp .github/workflows/sync.yml /tmp/sync.yml

          git remote add chester https://github.com/ChesterDescallar/NonsenseRealm.git
          git fetch chester main
          git reset --hard chester/main

          git filter-branch -f --env-filter '
            export GIT_AUTHOR_NAME="aurascale-team"
            export GIT_AUTHOR_EMAIL="reegen@aurascale.co.uk"
            export GIT_COMMITTER_NAME="aurascale-team"
            export GIT_COMMITTER_EMAIL="reegen@aurascale.co.uk"
          ' -- --all

          mkdir -p .github/workflows
          cp /tmp/sync.yml .github/workflows/sync.yml
          git add .github/workflows/sync.yml
          git commit --author="aurascale-team <reegen@aurascale.co.uk>" -m "chore: restore sync workflow" || true

          git push origin HEAD:main --force
